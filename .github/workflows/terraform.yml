name: Terraform

on:
  workflow_dispatch:
    inputs:
      action:
        description: Terraform action
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
          - destroy
      confirm_destroy:
        description: Type "destroy" to confirm destroy (required when action is destroy)
        required: false
        type: string

  pull_request:
    branches: [main]
    paths:
      - '**.tf'
      - '**.tfvars.example'
      - 'config/**'
      - '.github/workflows/terraform.yml'

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.14.8"

jobs:
  terraform:
    name: Terraform ${{ github.event_name == 'workflow_dispatch' && inputs.action || 'plan' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Terraform variables
        run: |
          echo "TF_VAR_project_name=${{ vars.TF_VAR_PROJECT_NAME != '' && vars.TF_VAR_PROJECT_NAME || 'failover-lab' }}" >> "$GITHUB_ENV"
          echo "TF_VAR_enable_azure=${{ vars.TF_VAR_ENABLE_AZURE != '' && vars.TF_VAR_ENABLE_AZURE || 'true' }}" >> "$GITHUB_ENV"
          echo "TF_VAR_enable_route53=${{ vars.TF_VAR_ENABLE_ROUTE53 != '' && vars.TF_VAR_ENABLE_ROUTE53 || 'true' }}" >> "$GITHUB_ENV"
          echo "TF_VAR_enable_https=${{ vars.TF_VAR_ENABLE_HTTPS != '' && vars.TF_VAR_ENABLE_HTTPS || 'false' }}" >> "$GITHUB_ENV"
          echo "TF_VAR_domain_name=${{ vars.TF_VAR_DOMAIN_NAME }}" >> "$GITHUB_ENV"
          echo "TF_VAR_app_subdomain=${{ vars.TF_VAR_APP_SUBDOMAIN != '' && vars.TF_VAR_APP_SUBDOMAIN || 'app' }}" >> "$GITHUB_ENV"
          echo "TF_VAR_create_hosted_zone=${{ vars.TF_VAR_CREATE_HOSTED_ZONE != '' && vars.TF_VAR_CREATE_HOSTED_ZONE || 'true' }}" >> "$GITHUB_ENV"
          echo "TF_VAR_hosted_zone_id=${{ vars.TF_VAR_HOSTED_ZONE_ID }}" >> "$GITHUB_ENV"
          echo "TF_VAR_aws_region=${{ vars.TF_VAR_AWS_REGION != '' && vars.TF_VAR_AWS_REGION || 'us-east-1' }}" >> "$GITHUB_ENV"
          echo "TF_VAR_aws_instance_type=${{ vars.TF_VAR_AWS_INSTANCE_TYPE != '' && vars.TF_VAR_AWS_INSTANCE_TYPE || 't3.micro' }}" >> "$GITHUB_ENV"
          echo "TF_VAR_azure_location=${{ vars.TF_VAR_AZURE_LOCATION != '' && vars.TF_VAR_AZURE_LOCATION || 'westus2' }}" >> "$GITHUB_ENV"
          echo "TF_VAR_azure_vm_size=${{ vars.TF_VAR_AZURE_VM_SIZE != '' && vars.TF_VAR_AZURE_VM_SIZE || 'Standard_D2s_v3' }}" >> "$GITHUB_ENV"
          echo "TF_VAR_health_check_interval=${{ vars.TF_VAR_HEALTH_CHECK_INTERVAL != '' && vars.TF_VAR_HEALTH_CHECK_INTERVAL || '30' }}" >> "$GITHUB_ENV"
          echo "TF_VAR_health_check_failure_threshold=${{ vars.TF_VAR_HEALTH_CHECK_FAILURE_THRESHOLD != '' && vars.TF_VAR_HEALTH_CHECK_FAILURE_THRESHOLD || '2' }}" >> "$GITHUB_ENV"

      - name: Validate destroy confirmation
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'destroy'
        run: |
          if [ "${{ inputs.confirm_destroy }}" != "destroy" ]; then
            echo "Destroy requires confirm_destroy input set to exactly: destroy"
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.TF_STATE_REGION || vars.TF_VAR_AWS_REGION || 'us-east-1' }}

      - name: Azure login
        if: vars.TF_VAR_ENABLE_AZURE != 'false'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ vars.TF_STATE_KEY || 'failover-lab/terraform.tfstate' }}" \
            -backend-config="region=${{ vars.TF_STATE_REGION || vars.TF_VAR_AWS_REGION || 'us-east-1' }}" \
            -backend-config="dynamodb_table=${{ vars.TF_STATE_DYNAMODB_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        id: plan
        if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.action == 'plan')
        run: |
          terraform plan -no-color -input=false -out=tfplan
          terraform show -no-color tfplan > plan.txt

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan.txt', 'utf8').slice(0, 60000);
            const body = `#### Terraform Plan 📖\n\`\`\`\n${plan}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Terraform apply
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'apply'
        run: terraform apply -auto-approve -input=false

      - name: Terraform destroy
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'destroy'
        run: terraform destroy -auto-approve -input=false

      - name: Terraform outputs
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'apply'
        run: terraform output
